name: TESTE CI

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Node.js @20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Dependencies
        run: npm ci

      - name: Test
        run: npm test
  

  build:
    runs-on: ubuntu-latest

    needs: test

    steps:
      - name: Montar .env
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Exportar para plataforma web
        run: npx expo export --platform web

      - name: Criar .nojekyll
        run: touch dist/.nojekyll

      - name: Upload dist como artefato
        id: build
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: dist/
          retention-days: 0


  deploy:
    runs-on: ubuntu-latest

    needs: build

    permissions:
      pages: write
      id-token: write
      contents: read
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


  build-android:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Node.js @20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Dependencies
        run: npm ci

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Montar .env
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Permissão gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk


  create-release:
      runs-on: ubuntu-latest
      needs: build-android
      permissions:
        contents: write
      steps:
        - name: Download APK
          uses: actions/download-artifact@v4
          with:
            name: app-release

        - name: Publicar Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: v${{ github.run_number }}
            name: "Release v${{ github.run_number }}"
            files: app-release.apk
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}